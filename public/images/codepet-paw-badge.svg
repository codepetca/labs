<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Codepet paw badge</title>
  <desc id="desc">A minimal orange gradient paw icon on a warm circular badge.</desc>
  <defs>
    <linearGradient id="badge-bg" x1="96" y1="60" x2="416" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffaf0" />
      <stop offset="0.56" stop-color="#fff2df" />
      <stop offset="1" stop-color="#f7e1cc" />
    </linearGradient>
    <linearGradient id="paw-fill" x1="142" y1="130" x2="366" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb347" />
      <stop offset="0.48" stop-color="#f47a3c" />
      <stop offset="1" stop-color="#d94f2f" />
    </linearGradient>
    <radialGradient id="paw-glow" cx="0" cy="0" r="1" gradientTransform="matrix(148 188 -185 146 201 156)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2cc" stop-opacity="0.62" />
      <stop offset="0.5" stop-color="#fff2cc" stop-opacity="0.16" />
      <stop offset="1" stop-color="#fff2cc" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-shadow" x="72" y="92" width="368" height="352" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#8f311f" flood-opacity="0.2" />
    </filter>
    <clipPath id="paw-clip">
      <ellipse cx="176" cy="198" rx="41" ry="53" transform="rotate(-24 176 198)" />
      <ellipse cx="230" cy="162" rx="39" ry="55" transform="rotate(-8 230 162)" />
      <ellipse cx="282" cy="162" rx="39" ry="55" transform="rotate(8 282 162)" />
      <ellipse cx="336" cy="198" rx="41" ry="53" transform="rotate(24 336 198)" />
      <path d="M256 235c45 0 88 42 100 94 11 49-20 91-61 80-19-5-25-16-39-16s-20 11-39 16c-41 11-72-31-61-80 12-52 55-94 100-94z" />
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="238" fill="url(#badge-bg)" />
  <circle cx="256" cy="256" r="232" fill="none" stroke="#f1cdb2" stroke-width="8" />

  <g filter="url(#soft-shadow)">
    <g fill="url(#paw-fill)">
      <ellipse cx="176" cy="198" rx="41" ry="53" transform="rotate(-24 176 198)" />
      <ellipse cx="230" cy="162" rx="39" ry="55" transform="rotate(-8 230 162)" />
      <ellipse cx="282" cy="162" rx="39" ry="55" transform="rotate(8 282 162)" />
      <ellipse cx="336" cy="198" rx="41" ry="53" transform="rotate(24 336 198)" />
      <path d="M256 235c45 0 88 42 100 94 11 49-20 91-61 80-19-5-25-16-39-16s-20 11-39 16c-41 11-72-31-61-80 12-52 55-94 100-94z" />
    </g>
    <g clip-path="url(#paw-clip)">
      <rect x="112" y="96" width="288" height="336" fill="url(#paw-glow)" />
      <path
        fill="#fff8df"
        fill-opacity="0.28"
        d="M183 167c15-20 43-32 70-33 25-1 47 7 63 22-18-8-38-11-59-9-30 2-56 12-74 20z"
      />
    </g>
  </g>
</svg>
